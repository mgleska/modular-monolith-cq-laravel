          content:
            application/json:
              schema:
                type: object
                example:
                  id: 45
                  productEan: '8410564006257'
                  productName: 'Red square'
                  price: 805
                  lowestPrice: 950
                  imageUrl: 'https://my.images.com/red-square.png'
                  quantityLevel: available
                properties:
                  id:
                    type: integer
                    example: 45
                    description: 'Must be an integer.'
                  productEan:
                    type: string
                    example: '8410564006257'
                    description: 'Must be a string.'
                  productName:
                    type: string
                    example: 'Red square'
                    description: 'Must be a string.'
                  price:
                    type: integer
                    example: 805
                    description: 'Must be an integer.'
                  lowestPrice:
                    type: integer
                    example: 950
                    description: 'Must be an integer.'
                    nullable: true
                  imageUrl:
                    type: string
                    example: 'https://my.images.com/red-square.png'
                    description: 'Must be a string.'
                  quantityLevel:
                    type: string
                    example: available
                    description: 'Must be one of: <code>UNKNOWN</code> (unknown), <code>AVAILABLE</code> (available), <code>AVAILABLE_LOW</code> (available_low).'
                    enum:
                      - unknown
                      - available
                      - available_low
                required:
                  - id
                  - productEan
                  - productName
                  - price
                  - imageUrl
                  - quantityLevel
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Unauthenticated.
                properties:

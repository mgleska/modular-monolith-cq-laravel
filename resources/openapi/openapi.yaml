                  description: 'Must be an integer.'
                  example: 10
              required:
                - storeId
  /api/offer/list:
    get:
      summary: 'List offers'
      operationId: listOffers
      description: 'Show list of offers in selected store.'
      parameters:
        -
          in: query
          name: page
          description: 'Must be an integer. Must be minimum <code>1</code>.'
          example: 2
          required: false
          schema:
            type: integer
            description: 'Must be an integer. Must be minimum <code>1</code>.'

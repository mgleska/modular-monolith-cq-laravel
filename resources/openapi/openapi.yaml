openapi: 3.0.3
info:
  title: 'MM-CQ-Laravel API Documentation'
  description: ''
  version: 1.0.0
servers:
  -
    url: 'http://localhost'
tags:
  -
    name: 'mobile API'
    description: ''
  -
    name: CMS
    description: ''
components:
  securitySchemes:
    default:
      type: http
      scheme: bearer
      description: 'You can retrieve your token by visiting your dashboard and clicking <b>Generate API token</b>.'
security:
  -
    default: []
paths:
  /api/customer/login:
    post:
      summary: 'ONYLY FOR DEMO: Login'
      operationId: oNYLYFORDEMOLogin
      description: 'Enpoint returns new JWT access token for supplied mobile user ID. If given user does not exist in database - will be created.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  token: 'JWT access_token'
                properties:
                  token:
                    type: string
                    example: 'JWT access_token'
                    description: 'Must be a string.'
                required:
                  - token
        422:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Error message for field1. (and 1 more error)'
                  errors:
                    field1:
                      - 'Example error message for field1.'
                    field2:
                      - 'Example error message for field2.'
                properties:
                  message:
                    type: string
                    example: 'Error message for field1. (and 1 more error)'
                  errors:
                    type: object
                    properties:
                      field1:
                        type: array
                        example:
                          - 'Example error message for field1.'
                        items:
                          type: string
                      field2:
                        type: array
                        example:
                          - 'Example error message for field2.'
                        items:
                          type: string
      tags:
        - 'mobile API'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                customerId:
                  type: integer
                  description: 'Must be an integer.'
                  example: 15
              required:
                - customerId
      security: []
  /api/customer/change-store:
    post:
      summary: 'Set store for mobile user'
      operationId: setStoreForMobileUser
      description: 'Endpoint sets given store for mobile user and returns new JWT access token with this store.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  token: 'JWT access_token'
                properties:
                  token:
                    type: string
                    example: 'JWT access_token'
                    description: 'Must be a string.'
                required:
                  - token
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Unauthenticated.
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
        422:

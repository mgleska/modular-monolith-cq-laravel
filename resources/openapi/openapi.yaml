            application/json:
              schema:
                type: object
                example:
                  items:
                    -
                      id: 45
                      productEan: '8410564006257'
                      productName: 'Red square'
                      price: 805
                      lowestPrice: 950
                  page: 1
                  perPage: 5
                properties:
                  items:
                    type: array
                    example:
                      -
                        id: 45
                        productEan: '8410564006257'
                        productName: 'Red square'
                        price: 805
                        lowestPrice: 950
                    description: 'Must be an array of objects.'
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 45
                        productEan:
                          type: string
                          example: '8410564006257'
                        productName:
                          type: string
                          example: 'Red square'
                        price:
                          type: integer
                          example: 805
                        lowestPrice:
                          type: integer
                          example: 950
                  page:
                    type: integer
                    example: 1
                    description: 'Must be an integer.'
                  perPage:
                    type: integer
                    example: 5
                    description: 'Must be an integer.'
                required:
                  - items
                  - page
                  - perPage
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Unauthenticated.
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
        422:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Error message for field1. (and 1 more error)'
                  errors:
                    field1:
                      - 'Example error message for field1.'
                    field2:
                      - 'Example error message for field2.'
                properties:
